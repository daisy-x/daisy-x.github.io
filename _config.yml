# Site settings
title: daisy-x's Blog
SEOTitle: daisy-x 的博客
header-img: img/cxbnudshgfdsu.jpg
email: daisy-x@gmail.com
description: "道阻且长"
keyword: "daisy-x, Linux, web 渗透"
url: "https://daisy-x.github.io/"          # your host, for absolute URL
baseurl: ""      # for example, '/blog' if your blog hosted on 'host/blog'
github_repo: "https://github.com/daisy-x/daisy-x.github.io.git" # you code repository

# Sidebar settings
sidebar: true                           # whether or not using Sidebar.
sidebar-about-description: ""
# sidebar-avatar: /img/      # use absolute URL, seeing it's used in both `/` and `/about/`



# SNS settings
RSS: false
# weibo_username:     
# zhihu_username:     
github_username:   daisy-x
# facebook_username:  
# jianshu_username:   
# twitter_username:   




# Build settings
# from 2016, 'pygments' is unsupported on GitHub Pages. Use 'rouge' for highlighting instead.
permalink: pretty
paginate: 10
exclude: ["less","node_modules","Gruntfile.js","package.json","README.md"]
anchorjs: true                          # if you want to customize anchor. check out line:181 of `post.html`



# Gems
# from PR#40, to support local preview for Jekyll 3.0
gems: [jekyll-paginate]




# Markdown settings
# replace redcarpet to kramdown,
# although redcarpet can auto highlight code, the lack of header-id make the catalog impossible, so I switch to kramdown
# document: http://jekyllrb.com/docs/configuration/#kramdown
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM                            # use Github Flavored Markdown !important



# 评论系统
# Disqus（https://disqus.com/）
# disqus_username: daisy-x

# Gitalk
gitalk:
  enable: true    #是否开启Gitalk评论
  clientID: 824396837446dab0d8e6                            #生成的clientID
  clientSecret: c9fa5f71d58a64198ee634de5c3c4993a1c3326d    #生成的clientSecret
  repo: daisy-x.github.io    #仓库名称
  owner: daisy-x    #github用户名
  admin: daisy-x
  distractionFreeMode: true #是否启用类似FB的阴影遮罩


# 统计

# Analytics settings
